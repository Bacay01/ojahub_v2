<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Header placeholder -->
    <div id="header"></div>

    <!-- HOW IT WORKS SECTION -->
    <section class="marketplace-section">
      <div class="marketplace-section-container">
        <!-- HEADER -->
        <div class="marketplace-hero">
          <div class="marketplace-eyebrow">Simple process</div>

          <h1 class="marketplace">How OjaHub Works</h1>

          <p class="marketplace">
            A simple guide to finding and connecting with vendors
          </p>
        </div>

        <!-- FILTER SECTION -->
        <section class="vendor-filter">
          <input
            type="text"
            id="searchInput"
            placeholder="Search for vendors..."
          />

          <div class="categories">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="food">Food</button>
            <button class="category-btn" data-category="fashion">
              Fashion
            </button>
            <button class="category-btn" data-category="beauty">Beauty</button>
            <button class="category-btn" data-category="phones">Phones</button>
            <button class="category-btn" data-category="services">
              Services
            </button>
            <button class="category-btn" data-category="others">Others</button>
          </div>
        </section>

        <!-- VENDORS GRID -->
        <section class="vendors" id="vendorList">
          <div class="vendor-grid" id="vendorsContainer">
            
          </div>
        </section>

        <!-- FULL DETAIL VIEW -->
        <section class="vendor-detail hidden" id="vendorDetail">
          <button id="backBtn">← Back to Vendors</button>

          <div class="detail-card">
            <img id="detailImg" />

            <div class="detail-content">
              <span id="detailTag" class="card-content-tag"></span>
              <h1 id="detailName"></h1>
              <p id="detailDesc"></p>
              <p id="detailLocation"></p>

              <a id="detailWhatsapp" target="_blank">Contact Vendor</a>
            </div>
          </div>
        </section>
      </div>
    </section>

    <!-- Footer placeholder -->
    <div id="footer"></div>

    <!-- <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script> -->
    <script type="module" src="marketplace.js"></script>
  </body>
</html>
