    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace - OjaHub</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FONT AWESOME -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- YOUR CSS -->
    <link rel="stylesheet" href="style.css" />

  </head>

  <body>
    <!-- Header placeholder -->
    <div id="header"></div>

        <!-- SEARCH -->
        <div class="search-bar">
          <div class="search-wrap">
            <span class="search-icon"
              ><i class="fa-solid fa-magnifying-glass"></i
            ></span>
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search products, vendors..."
            />
          </div>
        </div>

        <!-- HERO STRIP -->
        <div class="hero-strip">
          <p class="hero-label">
            <i class="fa-solid fa-cart-arrow-down"></i> OjaHub Marketplace
          </p>
          <h1 class="hero-title">
            Shop from Nigerian <span class="accent">Vendors</span>
          </h1>
          <p class="hero-sub">Browse products from verified local businesses</p>
        </div>

        <!-- CATEGORIES BAR -->
        <div class="categories-bar">
          <button class="cat-btn active" data-category="all">All</button>
          <button class="cat-btn" data-category="food">🍲 Food</button>
          <button class="cat-btn" data-category="fashion">👗 Fashion</button>
          <button class="cat-btn" data-category="beauty">💄 Beauty</button>
          <button class="cat-btn" data-category="phones">
            📱 Phones & Tech
          </button>
          <button class="cat-btn" data-category="electronics">
            ⚡ Electronics
          </button>
          <button class="cat-btn" data-category="services">🔧 Services</button>
          <button class="cat-btn" data-category="others">📦 Others</button>
        </div>

        <!-- RESULTS INFO -->
        <div class="results-bar">
          <span id="resultsCount" class="results-count"
            >Loading products...</span
          >
          <div class="sort-wrap">
            <label for="sortSelect">Sort:</label>
            <select id="sortSelect" class="sort-select">
              <option value="newest">Newest First</option>
              <option value="price-low">Price: Low to High</option>
              <option value="price-high">Price: High to Low</option>
            </select>
          </div>
        </div>

        <!-- PRODUCTS GRID -->
        <main class="products-section">
          <div id="productsGrid" class="products-grid">
            <!-- Skeleton loaders -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
          </div>

          <!-- EMPTY STATE -->
          <div id="emptyState" class="empty-state" style="display: none">
            <div class="empty-icon">🛍️</div>
            <h3>No products found</h3>
            <p>Try a different category or search term</p>
            <button class="btn-primary" onclick="resetFilters()">
              Show All Products
            </button>
          </div>
        </main>

        <!-- PRODUCT MODAL -->
        <div
          id="productModal"
          class="modal-overlay"
          style="display: none"
          onclick="closeModal(event)"
        >
          <div class="modal-box">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-inner">
              <div class="modal-img-wrap">
                <img id="modalImage" src="" alt="" class="modal-img" />
              </div>
              <div class="modal-details">
                <span id="modalCategory" class="modal-badge"></span>
                <h2 id="modalName" class="modal-title"></h2>
                <p id="modalPrice" class="modal-price"></p>
                <p id="modalDescription" class="modal-desc"></p>
                <div class="modal-vendor">
                  <span class="vendor-label">Sold by</span>
                  <span id="modalVendor" class="vendor-name"></span>
                </div>
                <a
                  id="modalWhatsapp"
                  href="#"
                  target="_blank"
                  class="whatsapp-btn"
                >
                  💬 Contact Vendor on WhatsApp
                </a>
              </div>
            </div>
          </div>
        </div>
