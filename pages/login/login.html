<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Vendor Login – Access Your Dashboard | OjaHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../../style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- Header -->
    <div id="header"></div>

    <!-- PAGE -->
    <main class="login-page">
      <!-- LEFT PANEL -->
      <div class="login-left">
        <div class="left-inner">
          <div class="brand-mark">
            <span class="brand-dot"></span>
            OjaHub
          </div>
          <h1>Welcome back, <span>vendor.</span></h1>
          <p class="left-sub">
            Pick up right where you left off. Your customers are waiting.
          </p>
          <div class="left-stats">
            <div class="l-stat">
              <strong>500+</strong>
              <span>Vendors</span>
            </div>
            <div class="l-stat">
              <strong>Daily</strong>
              <span>Customers</span>
            </div>
            <div class="l-stat">
              <strong>Free to</strong>
              <span>Start</span>
            </div>
          </div>
          <div class="left-pattern" aria-hidden="true"></div>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="login-right">
        <div class="login-card">
          <!-- MONKEY -->
          <div class="monkey-display" id="monkeyDisplay">
            <svg
              class="monkey-big"
              viewBox="0 0 96 96"
              xmlns="http://www.w3.org/2000/svg"
            >
              <!-- head -->
              <circle cx="48" cy="52" r="32" fill="#c8722a" />
              <!-- ears -->
              <circle cx="16" cy="56" r="10" fill="#c8722a" />
              <circle cx="80" cy="56" r="10" fill="#c8722a" />
              <circle cx="16" cy="56" r="6.5" fill="#e8a87c" />
              <circle cx="80" cy="56" r="6.5" fill="#e8a87c" />
              <!-- face muzzle -->
              <ellipse cx="48" cy="62" rx="22" ry="17" fill="#e8a87c" />
              <!-- nostrils -->
              <circle cx="43" cy="62" r="2.5" fill="#c8722a" />
              <circle cx="53" cy="62" r="2.5" fill="#c8722a" />
              <!-- mouth -->
              <path
                d="M40 70 Q48 76 56 70"
                stroke="#c8722a"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
              />

              <!-- EYES OPEN -->
              <g class="eyes-open">
                <ellipse cx="36" cy="44" rx="7" ry="7" fill="white" />
                <circle cx="36" cy="44" r="4" fill="#1a1a1a" />
                <circle cx="38" cy="42" r="1.8" fill="white" />
                <ellipse cx="60" cy="44" rx="7" ry="7" fill="white" />
                <circle cx="60" cy="44" r="4" fill="#1a1a1a" />
                <circle cx="62" cy="42" r="1.8" fill="white" />
              </g>

              <!-- HANDS COVERING EYES -->
              <g class="eyes-covered">
                <!-- left hand -->
                <ellipse cx="34" cy="44" rx="12" ry="10" fill="#c8722a" />
                <circle cx="23" cy="38" r="4.5" fill="#c8722a" />
                <circle cx="28" cy="34" r="4.5" fill="#c8722a" />
                <circle cx="35" cy="33" r="4.5" fill="#c8722a" />
                <circle cx="42" cy="34" r="4.5" fill="#c8722a" />
                <!-- right hand -->
                <ellipse cx="62" cy="44" rx="12" ry="10" fill="#c8722a" />
                <circle cx="73" cy="38" r="4.5" fill="#c8722a" />
                <circle cx="68" cy="34" r="4.5" fill="#c8722a" />
                <circle cx="61" cy="33" r="4.5" fill="#c8722a" />
                <circle cx="54" cy="34" r="4.5" fill="#c8722a" />
              </g>
            </svg>
          </div>

          <h2>Sign In</h2>
          <p class="card-sub">Access your vendor dashboard</p>

          <form id="loginForm">
            <div class="field">
              <label for="loginEmail">Email Address</label>
              <div class="input-wrap">
                <span class="input-icon">
                  <svg
                    viewBox="0 0 20 20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    width="16"
                    height="16"
                  >
                    <path
                      d="M2.5 5.5h15v10h-15z"
                      rx="1"
                      stroke-linecap="round"
                    />
                    <path d="M2.5 5.5l7.5 6 7.5-6" stroke-linecap="round" />
                  </svg>
                </span>
                <input
                  type="email"
                  id="loginEmail"
                  placeholder="you@example.com"
                  required
                />
              </div>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="loginPassword">Password</label>
                <a href="#" id="forgotPasswordLink" class="forgot-link"
                  >Forgot password?</a
                >
              </div>
              <div class="password-wrap" id="passwordWrap">
                <span class="input-icon">
                  <svg
                    viewBox="0 0 20 20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.5"
                    width="16"
                    height="16"
                  >
                    <rect x="4" y="9" width="12" height="8" rx="1.5" />
                    <path d="M7 9V6.5a3 3 0 016 0V9" stroke-linecap="round" />
                  </svg>
                </span>
                <input
                  type="password"
                  id="loginPassword"
                  placeholder="Enter your password"
                  required
                />
                <button
                  type="button"
                  class="pw-toggle"
                  id="toggleLoginPassword"
                  aria-label="Toggle password"
                >
                  <svg
                    class="monkey-icon"
                    viewBox="0 0 48 48"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <circle cx="24" cy="26" r="16" fill="#c8722a" />
                    <circle cx="8" cy="28" r="5" fill="#c8722a" />
                    <circle cx="40" cy="28" r="5" fill="#c8722a" />
                    <circle cx="8" cy="28" r="3" fill="#e8a87c" />
                    <circle cx="40" cy="28" r="3" fill="#e8a87c" />
                    <ellipse cx="24" cy="30" rx="11" ry="9" fill="#e8a87c" />
                    <circle cx="21.5" cy="30" r="1.2" fill="#c8722a" />
                    <circle cx="26.5" cy="30" r="1.2" fill="#c8722a" />
                    <path
                      d="M20 34 Q24 37 28 34"
                      stroke="#c8722a"
                      stroke-width="1.2"
                      fill="none"
                      stroke-linecap="round"
                    />
                    <g class="eyes-open">
                      <ellipse cx="18" cy="22" rx="3.5" ry="3.5" fill="white" />
                      <circle cx="18" cy="22" r="2" fill="#1a1a1a" />
                      <circle cx="19" cy="21" r="0.8" fill="white" />
                      <ellipse cx="30" cy="22" rx="3.5" ry="3.5" fill="white" />
                      <circle cx="30" cy="22" r="2" fill="#1a1a1a" />
                      <circle cx="31" cy="21" r="0.8" fill="white" />
                    </g>
                    <g class="eyes-covered">
                      <ellipse cx="17" cy="22" rx="6" ry="5" fill="#c8722a" />
                      <circle cx="12.5" cy="19" r="2.2" fill="#c8722a" />
                      <circle cx="15" cy="17.5" r="2.2" fill="#c8722a" />
                      <circle cx="18" cy="17" r="2.2" fill="#c8722a" />
                      <circle cx="21" cy="17.5" r="2.2" fill="#c8722a" />
                      <ellipse cx="31" cy="22" rx="6" ry="5" fill="#c8722a" />
                      <circle cx="35.5" cy="19" r="2.2" fill="#c8722a" />
                      <circle cx="33" cy="17.5" r="2.2" fill="#c8722a" />
                      <circle cx="30" cy="17" r="2.2" fill="#c8722a" />
                      <circle cx="27" cy="17.5" r="2.2" fill="#c8722a" />
                    </g>
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit" class="login-btn">
              <span>Sign In</span>
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </button>

            <p class="register-link">
              Don't have an account?
              <a href="../signup/signup.html">Register your business</a>
            </p>
          </form>

          <p id="message"></p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../../main.js"></script>
    <script type="module" src="login.js"></script>
  </body>
</html>
